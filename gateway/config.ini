; Gateway 配置文件
; 所有配置项都可以根据实际需求修改

[server]
; 服务端口
port = 8888
; 最大连接数
max_connections = 1024
; 连接超时时间（秒）
timeout_seconds = 300

[redis]
; Redis 服务器地址
host = 127.0.0.1
; Redis 端口
port = 6379
; Redis 密码（无密码则留空）
password = 
; Redis 数据库编号
db = 0

[log]
; 日志级别: trace, debug, info, warn, error, critical
level = trace
; 日志文件路径
file = gateway.log
; 是否输出到控制台
console_output = true
; 是否输出到文件
file_output = true
; 日志文件最大大小（MB）
max_file_size = 10
; 日志文件保留数量
max_files = 5
; 控制台日志格式
console_pattern = [%Y-%m-%d %H:%M:%S.%e] [%^%7l%$] [%25s:%-4#] %v
; 文件日志格式
file_pattern = [%Y-%m-%d %H:%M:%S.%e] [%l] [PID:%P] [TID:%t] [%s:%#] [%!] %v

[debug]
; 是否启用调试模式
enabled = false
; 是否显示源码位置
show_source = true
