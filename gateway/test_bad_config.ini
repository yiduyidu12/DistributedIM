; 测试配置文件 - 包含各种错误
[server]
port = 99999              ; 无效端口（超出范围）
max_connections = -10     ; 无效连接数（负数）
timeout_seconds = abc     ; 无效值（非数字）
invalid_key = value       ; 未知键

[redis]
host = invalid-host       ; 无效主机格式
port = 70000              ; 无效端口
db = 20                   ; 无效数据库编号（超出范围）

[log]
level = invalid_level     ; 无效日志级别
file =                    ; 空文件路径
max_file_size = -5        ; 无效值
unknown_key = test        ; 未知键

; 没有section的键
standalone_key = value
