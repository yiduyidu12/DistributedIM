# DistributedIM - Nginx 反向代理配置
# 负责 TLS 终止和 WebSocket 代理转发

events {
    worker_connections 4096;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # 性能优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ============ 限流配置 ============
    # 每 IP 每秒最多 20 个请求
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
    # 每 IP 最多 50 个并发连接
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ============ 上游服务器定义 ============

    # C++ 网关集群（支持多实例）
    upstream gateway_backend {
        least_conn;
        server gateway:8888 max_fails=3 fail_timeout=30s;
        # 多实例扩展时取消注释：
        # server gateway-2:8888 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Go HTTP API 集群
    upstream api_backend {
        least_conn;
        server http-api:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # AI 服务集群
    upstream ai_backend {
        least_conn;
        server ai-service:8000 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # 文件服务
    upstream file_backend {
        server file-service:8081 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # ============ HTTP (80) → HTTPS (443) 重定向 ============
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ============ HTTPS 主服务 ============
    server {
        listen 443 ssl http2;
        server_name _;

        # TLS 1.3 配置
        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # 安全头
        add_header Strict-Transport-Security "max-age=63072000" always;
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;

        # ============ WebSocket 代理（到 C++ 网关） ============
        location /ws {
            limit_req zone=api_limit burst=10 nodelay;
            limit_conn conn_limit 10;

            proxy_pass http://gateway_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket 超时配置
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ============ HTTP API 代理（到 Go 服务） ============
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_conn conn_limit 20;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 文件上传大小限制
            client_max_body_size 50m;
        }

        # ============ AI 服务代理 ============
        location /ai/ {
            limit_req zone=api_limit burst=5 nodelay;

            proxy_pass http://ai_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # AI 调用超时（允许长响应）
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ============ 文件服务代理 ============
        location /files/ {
            proxy_pass http://file_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            client_max_body_size 100m;
        }

        # ============ Prometheus 指标（仅内部访问） ============
        location /metrics {
            allow 127.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;

            proxy_pass http://gateway_backend;
            proxy_http_version 1.1;
        }

        # ============ 前端静态文件 ============
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # ============ 健康检查 ============
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}
